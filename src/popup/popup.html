<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-icon">N</div>
      <div class="popup-title-wrap">
        <span class="popup-title">ChatNest</span>
        <span class="popup-subtitle">AI 对话导航</span>
      </div>
    </div>

    <div class="popup-section">
      <div class="section-label">显示模式</div>
      <div class="mode-options">
        <button class="mode-btn" data-mode="sidebar" id="btn-sidebar">
          <div class="mode-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="2" width="11" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <rect x="14" y="4" width="4" height="3" rx="1" fill="currentColor"/>
              <rect x="14" y="9" width="4" height="3" rx="1" fill="currentColor"/>
              <rect x="14" y="14" width="4" height="3" rx="1" fill="currentColor"/>
            </svg>
          </div>
          <div class="mode-info">
            <div class="mode-name">侧边导航条</div>
            <div class="mode-desc">窄条标记，点击快速定位</div>
          </div>
        </button>

        <button class="mode-btn" data-mode="floating" id="btn-floating">
          <div class="mode-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="3" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <line x1="7" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="7" y1="12" x2="11" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="mode-info">
            <div class="mode-name">悬浮面板</div>
            <div class="mode-desc">常驻浮动面板</div>
          </div>
        </button>
      </div>
    </div>

    <div class="popup-footer">
      <div class="toggle-row">
        <span class="toggle-label">对话导航</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
